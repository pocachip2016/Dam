<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>분류 검토</title>
  <style>
    body { font-family: sans-serif; margin: 24px; background: #f5f5f5; }
    h1 { font-size: 1.3rem; margin-bottom: 12px; }
    .nav { display: flex; gap: 12px; margin-bottom: 20px; font-size: 0.9rem; }
    .nav a { color: #4f8ef7; text-decoration: none; }
    .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filters select, .filters input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px #0001; }
    th, td { padding: 9px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.85rem; }
    th { background: #f0f0f0; font-weight: 600; }
    .badge { padding: 2px 7px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
    .candidate { background: #e8f0fe; color: #1a73e8; }
    .confirmed { background: #e6f4ea; color: #188038; }
    .rejected  { background: #fce8e6; color: #c5221f; }
    .btn { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-right: 4px; }
    .btn-ok  { background: #34a853; color: #fff; }
    .btn-no  { background: #ea4335; color: #fff; }
    .btn-re  { background: #fbbc04; color: #333; }
    .msg { margin-top: 8px; font-size: 0.85rem; color: #555; }
    .reclass-form { display:none; margin-top:6px; }
    .reclass-form select { padding:4px 8px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/admin/mapping-dashboard">대시보드</a>
    <a href="/admin/classification">분류 검토</a>
    <a href="/admin/content-mapping">매핑 검토</a>
    <a href="/admin/unclassified">미분류 처리</a>
  </div>
  <h1>분류 검토</h1>

  <div class="filters">
    <select id="sel-class">
      <option value="">전체 class</option>
      <option value="content">content</option>
      <option value="promotion">promotion</option>
      <option value="seasonal">seasonal</option>
      <option value="pricing">pricing</option>
      <option value="branding">branding</option>
      <option value="ui_service">ui_service</option>
      <option value="composition">composition</option>
      <option value="draft">draft</option>
      <option value="unclassified">unclassified</option>
    </select>
    <select id="sel-status">
      <option value="candidate">candidate</option>
      <option value="">전체 status</option>
      <option value="confirmed">confirmed</option>
      <option value="rejected">rejected</option>
    </select>
    <input type="number" id="inp-page" value="1" min="1" style="width:60px" title="페이지">
    <button onclick="load()" style="padding:6px 14px;border:none;background:#4f8ef7;color:#fff;border-radius:4px;cursor:pointer">조회</button>
  </div>

  <div id="msg" class="msg"></div>
  <table>
    <thead><tr><th>Asset ID</th><th>파일명</th><th>Class</th><th>Method</th><th>신호</th><th>Confidence</th><th>Status</th><th>작업</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    const CLASSES = ['content','promotion','seasonal','pricing','branding','ui_service','composition','draft','unclassified'];

    async function load() {
      const cls    = document.getElementById('sel-class').value;
      const status = document.getElementById('sel-status').value;
      const page   = document.getElementById('inp-page').value || 1;
      const target = cls || 'content';
      let url = `/api/mapping/by-class/${target}?page=${page}&size=50`;
      if (status) url += `&status=${status}`;
      const r = await fetch(url);
      const d = await r.json();
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      document.getElementById('msg').textContent = `총 ${d.total}건 (페이지 ${page})`;
      for (const row of (d.assets || [])) {
        const badge = `<span class="badge ${row.status}">${row.status}</span>`;
        const rfId = `rf-${row.asset_id}-${target}`;
        tbody.innerHTML += `<tr>
          <td>${row.asset_id}</td>
          <td title="${row.folder_path||''}">${row.filename||''}</td>
          <td>${target}</td>
          <td>${row.method||''}</td>
          <td>${row.sub_class||''}</td>
          <td>${row.confidence!=null?row.confidence.toFixed(3):''}</td>
          <td>${badge}</td>
          <td>
            <button class="btn btn-ok" onclick="act(${row.asset_id},'${target}','confirm')">✓</button>
            <button class="btn btn-no" onclick="act(${row.asset_id},'${target}','reject')">✗</button>
            <button class="btn btn-re" onclick="toggleReclass('${rfId}')">재분류</button>
            <div class="reclass-form" id="${rfId}">
              <select id="nc-${rfId}">${CLASSES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
              <button class="btn btn-re" onclick="doReclass(${row.asset_id},'${target}','${rfId}')">적용</button>
            </div>
          </td>
        </tr>`;
      }
    }

    function toggleReclass(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    async function act(assetId, cls, action) {
      const r = await fetch(`/api/admin/classification/${assetId}/${cls}/${action}`, {method:'POST'});
      if (r.ok) load(); else alert('오류: ' + r.status);
    }

    async function doReclass(assetId, oldCls, rfId) {
      const newCls = document.getElementById('nc-' + rfId).value;
      const r = await fetch('/api/admin/classification/reclass', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({asset_id: assetId, old_class: oldCls, new_class: newCls}),
      });
      if (r.ok) load(); else alert('오류: ' + r.status);
    }

    load();
  </script>
</body>
</html>
