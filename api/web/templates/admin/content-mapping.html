<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>콘텐츠 매핑 검토</title>
  <style>
    body { font-family: sans-serif; margin: 24px; background: #f5f5f5; }
    h1 { font-size: 1.3rem; margin-bottom: 12px; }
    .nav { display: flex; gap: 12px; margin-bottom: 20px; font-size: 0.9rem; }
    .nav a { color: #4f8ef7; text-decoration: none; }
    .filters { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .filters input, .filters select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px #0001; }
    th, td { padding: 9px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.85rem; }
    th { background: #f0f0f0; font-weight: 600; }
    .badge { padding: 2px 7px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
    .candidate { background: #e8f0fe; color: #1a73e8; }
    .confirmed { background: #e6f4ea; color: #188038; }
    .rejected  { background: #fce8e6; color: #c5221f; }
    .btn { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-right: 4px; }
    .btn-ok { background: #34a853; color: #fff; }
    .btn-no { background: #ea4335; color: #fff; }
    .add-form { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 20px; box-shadow: 0 1px 4px #0001; }
    .add-form h2 { font-size: 1rem; margin: 0 0 10px; }
    .add-form input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; margin-right: 6px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/admin/mapping-dashboard">대시보드</a>
    <a href="/admin/classification">분류 검토</a>
    <a href="/admin/content-mapping">매핑 검토</a>
    <a href="/admin/unclassified">미분류 처리</a>
  </div>
  <h1>콘텐츠 매핑 검토</h1>

  <div class="add-form">
    <h2>수동 매핑 추가</h2>
    <input type="number" id="add-asset" placeholder="Asset ID">
    <input type="number" id="add-content" placeholder="Content ID">
    <button class="btn btn-ok" onclick="addMapping()">추가</button>
    <span id="add-msg" style="font-size:0.85rem;color:#555;margin-left:8px"></span>
  </div>

  <div class="filters">
    <label>Content ID: <input type="number" id="inp-cid" placeholder="콘텐츠 ID" style="width:120px"></label>
    <button onclick="load()" style="padding:6px 14px;border:none;background:#4f8ef7;color:#fff;border-radius:4px;cursor:pointer">조회</button>
  </div>

  <table>
    <thead><tr><th>Asset ID</th><th>파일명</th><th>Confidence</th><th>Method</th><th>Status</th><th>작업</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    async function load() {
      const cid = document.getElementById('inp-cid').value;
      if (!cid) { document.getElementById('tbody').innerHTML = '<tr><td colspan="6">Content ID를 입력하세요.</td></tr>'; return; }
      const r = await fetch(`/api/mapping/by-content/${cid}`);
      if (!r.ok) { document.getElementById('tbody').innerHTML = `<tr><td colspan="6">매핑 없음 (${r.status})</td></tr>`; return; }
      const d = await r.json();
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      for (const row of (d.assets || [])) {
        tbody.innerHTML += `<tr>
          <td>${row.asset_id}</td>
          <td>${row.filename||''}</td>
          <td>${row.confidence!=null?row.confidence.toFixed(3):''}</td>
          <td>${row.method||''}</td>
          <td><span class="badge ${row.status}">${row.status}</span></td>
          <td>
            <button class="btn btn-ok" onclick="act(${row.asset_id},${cid},'confirm')">✓</button>
            <button class="btn btn-no" onclick="act(${row.asset_id},${cid},'reject')">✗</button>
          </td>
        </tr>`;
      }
    }

    async function act(assetId, contentId, action) {
      const r = await fetch(`/api/admin/mapping/${assetId}/${contentId}/${action}`, {method:'POST'});
      if (r.ok) load(); else alert('오류: ' + r.status);
    }

    async function addMapping() {
      const assetId   = document.getElementById('add-asset').value;
      const contentId = document.getElementById('add-content').value;
      if (!assetId || !contentId) { alert('Asset ID와 Content ID를 입력하세요.'); return; }
      const r = await fetch('/api/admin/mapping/add', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({asset_id: parseInt(assetId), content_id: parseInt(contentId)}),
      });
      const msg = document.getElementById('add-msg');
      if (r.ok) {
        msg.textContent = '추가 완료';
        document.getElementById('inp-cid').value = contentId;
        load();
      } else {
        msg.textContent = '오류: ' + r.status;
      }
    }
  </script>
</body>
</html>
