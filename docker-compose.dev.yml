# Dam PoC 로컬 인프라
# 포트: dam_postgres 15432 | dam_redis 16379 | (Phase 2+) dam_api 18000
# 볼륨(DB): ./data/  — WSL2 ext4 (NTFS는 chmod 미지원으로 PostgreSQL 불가)
# 볼륨(소스/스캔): /mnt/d/dam_analysis/  — D: NTFS (대용량 원본 데이터)
#
# 실행: docker compose up -d
# 접속: psql -h localhost -p 15432 -U dam -d dam

services:
  dam_postgres:
    image: pgvector/pgvector:pg16
    container_name: dam_postgres
    command: ["postgres"]
    environment:
      POSTGRES_USER: dam
      POSTGRES_PASSWORD: dam
      POSTGRES_DB: dam
      TZ: Asia/Seoul
      DAM_ALLOW_INIT: "yes"
    ports:
      - "15432:5432"
    volumes:
      - ./data/pg_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dam -d dam"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dam_redis:
    image: redis:7-alpine
    container_name: dam_redis
    ports:
      - "16379:6379"
    volumes:
      - ./data/redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  dam_api:
    build: .
    container_name: dam_api
    ports:
      - "18000:8000"
    environment:
      DAM_DSN: postgresql://dam:dam@dam_postgres:5432/dam
      DAM_REDIS: redis://dam_redis:6379/0
      DAM_POSTER_ROOT: /dam_posters
      DAM_CORS_ORIGINS: "http://localhost:3001,http://localhost:3002,http://localhost:3100"
      DAM_DISABLE_AUTH: "1"
      MODEL_CACHE_DIR: /home/ktalpha/Work/Dam/dam_data/models
    volumes:
      - /mnt/d/Work/Dam/dam_data:/home/ktalpha/Work/Dam/dam_data:ro
      - ./data/posters:/dam_posters   # poster ingest 쓰기 전용 볼륨
      - .:/app                        # dev: 소스코드 실시간 반영
      - ./.venv/lib:/venv/lib:ro      # dev: torch/open_clip 포함 venv 라이브러리
    command: >
      sh -c "PYTHONPATH=/venv/lib/python3.12/site-packages uvicorn api.search:app --host 0.0.0.0 --port 8000"
    depends_on:
      dam_postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: dam_net
