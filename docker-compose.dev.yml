# Dam PoC 로컬 인프라
# 포트: dam_postgres 15432 | dam_redis 16379 | (Phase 2+) dam_api 18000
# 볼륨(DB): ./data/  — WSL2 ext4 (NTFS는 chmod 미지원으로 PostgreSQL 불가)
# 볼륨(소스/스캔): /mnt/d/dam_analysis/  — D: NTFS (대용량 원본 데이터)
#
# 실행: docker compose up -d
# 접속: psql -h localhost -p 15432 -U dam -d dam

services:
  dam_postgres:
    image: pgvector/pgvector:pg16
    container_name: dam_postgres
    entrypoint: ["/usr/local/bin/dam_init_guard.sh"]
    command: ["postgres"]
    environment:
      POSTGRES_USER: dam
      POSTGRES_PASSWORD: dam
      POSTGRES_DB: dam
      TZ: Asia/Seoul
      # DAM_ALLOW_INIT: "yes"  # uncomment ONLY for intentional fresh cluster init
    ports:
      - "15432:5432"
    volumes:
      - ./scripts/postgres_entrypoint_guard.sh:/usr/local/bin/dam_init_guard.sh:ro
      - ./data/pg_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dam -d dam"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dam_redis:
    image: redis:7-alpine
    container_name: dam_redis
    ports:
      - "16379:6379"
    volumes:
      - ./data/redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  dam_api:
    build: .
    container_name: dam_api
    ports:
      - "18000:8000"
    environment:
      DAM_DSN: postgresql://dam:dam@dam_postgres:5432/dam
      DAM_REDIS: redis://dam_redis:6379/0
      DAM_POSTER_ROOT: /dam_posters
      DAM_TMDB_CAS_ROOT: /dam_tmdb_cas
    volumes:
      - /mnt/d/Work/Dam/dam_data:/home/ktalpha/Work/Dam/dam_data:ro
      - ./data/posters:/dam_posters   # poster ingest 쓰기 전용 볼륨
      - /mnt/d/dam_data/tmdb:/dam_tmdb_cas   # tmdb 이미지 CAS 영속 볼륨
    depends_on:
      dam_postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: dam_net
